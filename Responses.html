<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Response Dashboard</title>


    <link rel="apple-touch-icon" href="apple-touch-icon.png">

<link rel="icon" type="image/png" sizes="192x192" href="dashboard_icon.png">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">  
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        
        :root { 
            --bg: #020617; --card: #0f172a; --title: #ffffff;
            --body-text: #94a3b8; --msg-bg: rgba(0, 0, 0, 0.4);
            --border: rgba(255, 255, 255, 0.05); --input-text: #ffffff;
        }

        body.light-mode { 
            --bg: #f8fafc; --card: #ffffff; --title: #0f172a;
            --body-text: #475569; --msg-bg: #f1f5f9;
            --border: rgba(0, 0, 0, 0.08); --input-text: #0f172a;
        }

        body { 
            background: var(--bg); color: var(--body-text); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: all 0.4s ease; 
        }

        h1, h4 { color: var(--title); }
        .glass-card { background: var(--card); border: 1px solid var(--border); }
        .message-box { background: var(--msg-bg); color: var(--body-text); }
        input { color: var(--input-text) !important; }

        .filter-btn { transition: all 0.2s; border: 1px solid rgba(99, 102, 241, 0.2); color: var(--body-text); }
        .filter-btn.active { background: #6366f1; color: white !important; border-color: #6366f1; }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-extrabold italic tracking-tighter text-indigo-500">Portfolio Response</h1>
                <p class="text-[10px] font-bold tracking-[0.4em] uppercase opacity-50">track My viewers...</p>
            </div>
            <button onclick="toggleTheme()" class="p-3 rounded-2xl glass-card text-xl hover:scale-110 transition-transform shadow-lg">
                <span id="theme-icon">🌙</span>
            </button>
        </header>

        <section class="glass-card p-8 rounded-[2.5rem] mb-6">
            <h2 class="text-[10px] font-black uppercase tracking-widest mb-6 text-indigo-500">Connection_Handshake</h2>
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="sheetUrl" placeholder="Paste Published CSV Link..." 
                       class="flex-1 bg-black/5 border border-indigo-500/20 p-5 rounded-2xl text-sm outline-none focus:border-indigo-500 transition-all">
                
                <div class="flex gap-2">
                    <button onclick="fetchData()" class="flex-1 md:flex-none bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-8 py-5 rounded-2xl text-xs uppercase tracking-widest transition-all shadow-lg shadow-indigo-500/20">
                        Connect
                    </button>
                    <button onclick="removeConnection()" id="removeBtn" class="hidden bg-red-500/10 hover:bg-red-500/20 text-red-500 border border-red-500/20 px-6 py-5 rounded-2xl text-xs font-black transition-all">
                        DELETE
                    </button>
                </div>
            </div>
        </section>

        <div id="controls-bar" class="hidden space-y-4 mb-8 animate-fade">
            <div class="relative">
                <input type="text" id="searchInput" onkeyup="applyFilters()" placeholder="Search names..." 
                       class="w-full bg-indigo-500/5 border border-indigo-500/20 p-4 pl-12 rounded-2xl text-sm outline-none focus:border-indigo-500 transition-all">
                <span class="absolute left-4 top-4 opacity-40">🔍</span>
            </div>

            <div class="flex flex-wrap items-center gap-3 px-2">
                <span class="text-[10px] font-bold uppercase tracking-widest opacity-50 mr-2">Sort:</span>
                <button onclick="updateSort('newest')" id="btn-newest" class="filter-btn active text-[10px] font-bold px-4 py-2 rounded-full uppercase">Newest</button>
                <button onclick="updateSort('oldest')" id="btn-oldest" class="filter-btn text-[10px] font-bold px-4 py-2 rounded-full uppercase">Oldest</button>
                <button onclick="updateSort('alpha')" id="btn-alpha" class="filter-btn text-[10px] font-bold px-4 py-2 rounded-full uppercase">A-Z</button>
            </div>
        </div>

        <div id="data-container" class="space-y-6">
            <div id="empty-state" class="glass-card p-20 rounded-[2.5rem] text-center opacity-30 border-dashed border-2 border-indigo-500/20">
                <p class="text-xs font-bold uppercase tracking-[0.4em]">Awaiting_Stream_Initialization</p>
            </div>
        </div>
    </div>

    <script>
        let masterData = []; 
        let currentSort = 'newest';

        // ON LOAD: Check for saved URL
        window.onload = () => {
            const savedUrl = localStorage.getItem('portfolio_sheet_url');
            if (savedUrl) {
                document.getElementById('sheetUrl').value = savedUrl;
                fetchData();
            }
        };

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-mode');
            document.getElementById('theme-icon').innerText = body.classList.contains('light-mode') ? '☀️' : '🌙';
        }

        async function fetchData() {
            const url = document.getElementById('sheetUrl').value;
            if(!url) return;

            try {
                const response = await fetch(url);
                const text = await response.text();
                const rows = text.split('\n').slice(1); 
                masterData = rows.map(row => {
                    const cols = row.split(',');
                    return { date: cols[0], name: cols[1], email: cols[2], msg: cols[3] };
                }).filter(item => item.name && item.name.trim() !== "");

                // SAVE TO LOCAL STORAGE
                localStorage.setItem('portfolio_sheet_url', url);
                
                document.getElementById('controls-bar').classList.remove('hidden');
                document.getElementById('removeBtn').classList.remove('hidden');
                applyFilters(); 
            } catch (e) {
                alert("Connection failed. Check your CSV link.");
            }
        }

        function removeConnection() {
            if(confirm("Are you sure you want to disconnect and delete the saved URL?")) {
                localStorage.removeItem('portfolio_sheet_url');
                document.getElementById('sheetUrl').value = '';
                document.getElementById('controls-bar').classList.add('hidden');
                document.getElementById('removeBtn').classList.add('hidden');
                document.getElementById('data-container').innerHTML = `
                    <div class="glass-card p-20 rounded-[2.5rem] text-center opacity-30 border-dashed border-2 border-indigo-500/20">
                        <p class="text-xs font-bold uppercase tracking-[0.4em]">Connection_Terminated</p>
                    </div>
                `;
                masterData = [];
            }
        }

        function updateSort(type) {
            currentSort = type;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${type}`).classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = masterData.filter(item => item.name.toLowerCase().includes(searchTerm));

            if (currentSort === 'newest') filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            else if (currentSort === 'oldest') filtered.sort((a, b) => new Date(a.date) - new Date(b.date));
            else if (currentSort === 'alpha') filtered.sort((a, b) => a.name.localeCompare(b.name));

            renderData(filtered);
        }

        function renderData(data) {
            const container = document.getElementById('data-container');
            container.innerHTML = data.length ? '' : `<div class="text-center py-10 opacity-40 text-xs uppercase tracking-widest">No matching records.</div>`;

            data.forEach(item => {
                container.innerHTML += `
                    <article class="glass-card p-8 rounded-[2.5rem] border-l-4 border-indigo-600 transition-all hover:translate-x-1 animate-fade">
                        <div class="flex justify-between items-start mb-6">
                            <div class="flex items-center gap-4">
                                <div class="w-14 h-14 rounded-2xl bg-indigo-600/10 border border-indigo-500/20 flex items-center justify-center text-xl font-black text-indigo-500">
                                    ${item.name.charAt(0).toUpperCase()}
                                </div>
                                <div>
                                    <h4 class="font-extrabold text-xl tracking-tight uppercase">${item.name}</h4>
                                    <p class="text-xs font-medium text-indigo-500 opacity-70">${item.email}</p>
                                </div>
                            </div>
                            <time class="text-[9px] font-bold opacity-40 uppercase tracking-widest">${item.date}</time>
                        </div>
                        <div class="message-box p-6 rounded-3xl mb-6 border border-indigo-500/10 italic text-base leading-relaxed">
                            "${item.msg}"
                        </div>
                        <div class="flex justify-end">
                           <a href="https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(item.email)}&su=Portfolio Response: Follow-up for ${encodeURIComponent(item.name)}" 
                              target="_blank" 
                              class="bg-indigo-600/10 hover:bg-indigo-600 border border-indigo-500/30 text-indigo-500 hover:text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all">
                              Direct_Reply
                           </a>
                        </div>
                    </article>
                `;
            });
        }
    </script>
</body>
</html>
